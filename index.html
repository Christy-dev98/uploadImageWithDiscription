<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1">
    <title>Hello, World!</title>
  </head>
  <body>
      <!-- Bootstrap -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<!-- Cropper -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">


<style>
    /* ==========================================
   MODAL
========================================== */

.return-modal {

    background: #1f2937;
    color: #fff;

    border: 1px solid #334155;
    border-radius: 16px;

    overflow: hidden;
}

.return-modal .modal-header {

    background: #1f2937;

    border-bottom: 1px solid #334155;
}

.return-modal .modal-footer {

    background: #1f2937;

    border-top: 1px solid #334155;
}

.return-modal .modal-title {

    font-weight: 600;
}

.return-modal .close {

    color: white;
    opacity: .8;
}

.return-modal .close:hover {

    opacity: 1;
}

/* ==========================================
   IMAGE CONTAINER
========================================== */

.image-container {

    position: relative;

    width: 100%;
    height: 360px;

    background: #0f172a;

    border: 1px solid #334155;
    border-radius: 12px;

    overflow: hidden;
}

/* ==========================================
   UPLOAD AREA
========================================== */

#uploadArea {

    width: 100%;
    height: 100%;

    display: flex;

    justify-content: center;
    align-items: center;

    text-align: center;

    border: 2px dashed #475569;

    cursor: pointer;

    transition: all .25s ease;
}

#uploadArea.drag-over {

    border-color: #3b82f6;

    background: rgba(37,99,235,.08);
}

.upload-content {

    padding: 20px;
}

.upload-icon {

    font-size: 48px;

    color: #60a5fa;

    margin-bottom: 12px;
}

.upload-content h5 {

    font-weight: 600;

    margin-bottom: 12px;
}

.upload-content p {

    color: #94a3b8;

    margin-bottom: 10px;
}

.or-text {

    color: #94a3b8;

    margin-bottom: 12px;
}

/* ==========================================
   PREVIEW
========================================== */

#previewArea {

    width: 100%;
    height: 100%;
}

#previewImage {

    width: 100%;
    height: 100%;

    object-fit: contain;

    display: block;
}

/* ==========================================
   3 DOT MENU
========================================== */

.image-dropdown {

    position: absolute;

    top: 10px;
    right: 10px;

    z-index: 9999;
}

#imageMenuBtn {

    width: 38px;
    height: 38px;

    border-radius: 50%;

    background: rgba(15,23,42,.9);

    display: flex;

    justify-content: center;
    align-items: center;

    text-decoration: none;
}

#imageMenuBtn:hover {

    background: #2563eb;
}

#imageMenuBtn i {

    color: white;
}

/* ==========================================
   DROPDOWN
========================================== */

.dropdown-menu {

    background: #111827;

    border: 1px solid #334155;

    min-width: 180px;
}

.dropdown-item {

    color: #e5e7eb;
}

.dropdown-item:hover {

    background: #2563eb;

    color: white;
}

.dropdown-divider {

    border-top: 1px solid #334155;
}

/* ==========================================
   MOBILE UPLOAD MENU
========================================== */

#uploadOptionMenu {

    position: absolute;

    left: 50%;
    top: 50%;

    transform: translate(-50%, -50%);

    width: 260px;

    background: #111827;

    border: 1px solid #334155;
    border-radius: 12px;

    overflow: hidden;

    z-index: 2000;

    box-shadow: 0 10px 25px rgba(0,0,0,.35);
}

#uploadOptionMenu button {

    width: 100%;

    border: none;

    background: transparent;

    color: white;

    text-align: left;

    padding: 14px 18px;

    transition: .2s;
}

#uploadOptionMenu button:hover {

    background: #2563eb;
}

#uploadOptionMenu button:first-child {

    border-bottom: 1px solid #334155;
}

/* ==========================================
   CROP ACTIONS
========================================== */

#cropActionArea .btn {

    min-width: 140px;
}

/* ==========================================
   TEXTAREA
========================================== */

.damage-textarea {

    background: #0f172a !important;

    color: white !important;

    border: 1px solid #475569;

    border-radius: 10px;

    resize: none;
}

.damage-textarea::placeholder {

    color: #94a3b8;
}

.damage-textarea:focus {

    background: #0f172a !important;

    color: white !important;

    border-color: #3b82f6;

    box-shadow: none;
}

/* ==========================================
   CROPPER
========================================== */

.cropper-view-box {

    outline: 2px solid #3b82f6;
}

.cropper-line {

    background: #3b82f6;
}

.cropper-point {

    background: #3b82f6;
}

/* ==========================================
   DESKTOP / MOBILE VISIBILITY
========================================== */

.desktop-upload-options {

    display: block;
}

.mobile-upload-text {

    display: none;

    color: #94a3b8;
}

/* ==========================================
   TABLET
========================================== */

@media (max-width: 992px) {

    .image-container {

        height: 300px;
    }
}

/* ==========================================
   MOBILE
========================================== */

@media (max-width: 768px) {

    .modal-dialog {

        margin: 10px;

        max-width: calc(100% - 20px);
    }

    .image-container {

        height: 260px;
    }

    .desktop-upload-options {

        display: none;
    }

    .mobile-upload-text {

        display: block;
    }

    .upload-icon {

        font-size: 38px;
    }

    .upload-content h5 {

        font-size: 18px;
    }

    #cropActionArea .btn {

        width: 100%;

        margin-bottom: 10px;
    }

    #cropActionArea .btn:last-child {

        margin-bottom: 0;
    }

    .modal-footer {

        display: flex;
    }

    .modal-footer .btn {

        flex: 1;
    }
}

/* ==========================================
   SMALL PHONES
========================================== */

@media (max-width: 480px) {

    .image-container {

        height: 220px;
    }

    .upload-content h5 {

        font-size: 16px;
    }

    .mobile-upload-text {

        font-size: 13px;
    }

    #uploadOptionMenu {

        width: 220px;
    }
}

/* ==========================================
   LARGE DESKTOP
========================================== */

@media (min-width: 1200px) {

    .image-container {

        height: 420px;
    }
}
</style>
<!-- Trigger Button -->
<div class="container text-center mt-5">

    <button class="btn btn-primary"
            data-toggle="modal"
            data-target="#returnProtocolModal">

        Open Return Gear

    </button>

</div>

<!-- Return Modal -->
<div class="modal fade"
     id="returnProtocolModal"
     tabindex="-1"
     role="dialog">

    <div class="modal-dialog modal-lg modal-dialog-centered"
         role="document">

        <div class="modal-content return-modal">

            <!-- Header -->
            <div class="modal-header">

                <h5 class="modal-title">
                    Return Gear
                </h5>

                <button type="button"
                        class="close text-white"
                        data-dismiss="modal">

                    <span>&times;</span>

                </button>

            </div>

            <!-- Body -->
            <div class="modal-body">

                <!-- Hidden Inputs -->

                <input type="file"
                       id="cameraInput"
                       accept="image/*"
                       capture="environment"
                       hidden>

                <input type="file"
                       id="deviceInput"
                       accept="image/*"
                       hidden>

                <!-- Image Container -->

                <div class="image-container">

                    <!-- 3 Dot Menu -->

                    <div class="dropdown image-dropdown">

                        <button class="btn btn-link text-white p-0"
                                id="imageMenuBtn"
                                data-toggle="dropdown"
                                type="button">

                            <i class="fas fa-ellipsis-v"></i>

                        </button>

                        <div class="dropdown-menu dropdown-menu-right">

                            <button type="button"
                                    class="dropdown-item"
                                    id="rotateBtn">

                                <i class="fas fa-sync-alt mr-2"></i>
                                Rotate

                            </button>

                            <button type="button"
                                    class="dropdown-item"
                                    id="cropBtn">

                                <i class="fas fa-crop-alt mr-2"></i>
                                Crop

                            </button>

                            <button type="button"
                                    class="dropdown-item"
                                    id="undoBtn">

                                <i class="fas fa-undo mr-2"></i>
                                Undo

                            </button>

                            <div class="dropdown-divider"></div>

                            <button type="button"
                                    class="dropdown-item text-danger"
                                    id="removeBtn">

                                <i class="fas fa-trash mr-2"></i>
                                Remove

                            </button>

                        </div>

                    </div>

                    <!-- Upload Area -->

                    <div id="uploadArea">

                        <div class="upload-content">

                            <i class="fas fa-camera upload-icon"></i>

                            <h5>
                                Upload Damage Image
                            </h5>

                            <!-- Desktop -->

                            <div class="desktop-upload-options">

                                <p>
                                    Drag & Drop Image Here
                                </p>

                                <div class="or-text">
                                    OR
                                </div>

                                <button type="button"
                                        id="desktopUploadBtn"
                                        class="btn btn-primary btn-sm">

                                    This Device

                                </button>

                            </div>

                            <!-- Mobile -->

                            <div class="mobile-upload-text">

                                Tap to Upload

                            </div>

                        </div>

                    </div>

                    <!-- Preview Area -->

                    <div id="previewArea"
                         class="d-none">

                        <img id="previewImage"
                             alt="Preview Image">

                    </div>

                    <!-- Mobile Upload Menu -->

                    <div id="uploadOptionMenu"
                         class="d-none">

                        <button type="button"
                                id="capturePhotoBtn">

                            <i class="fas fa-camera mr-2"></i>

                            Capture Photo

                        </button>

                        <button type="button"
                                id="devicePhotoBtn">

                            <i class="fas fa-folder-open mr-2"></i>

                            This Device

                        </button>

                    </div>

                </div>

                <!-- Crop Actions -->

                <div id="cropActionArea"
                     class="mt-3 text-center d-none">

                    <button type="button"
                            id="applyCropBtn"
                            class="btn btn-success">

                        Apply Crop

                    </button>

                    <button type="button"
                            id="cancelCropBtn"
                            class="btn btn-secondary ml-2">

                        Cancel Crop

                    </button>

                </div>

                <!-- Description -->

                <div class="mt-4">

                    <textarea
                        id="damageDescription"
                        class="form-control damage-textarea"
                        rows="4"
                        placeholder="Describe the damage..."></textarea>

                </div>

            </div>

            <!-- Footer -->

            <div class="modal-footer">

                <button type="button"
                        class="btn btn-secondary"
                        data-dismiss="modal">

                    Cancel

                </button>

                <button type="button"
                        class="btn btn-primary"
                        id="submitReturnBtn">

                    Submit Return

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Required Scripts -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script>
    // ========================================
// Global Variables
// ========================================

var cropper = null;

var originalImage = null;

var currentFileName = null;

// ========================================
// Cached Elements
// ========================================

var previewImage =
    document.getElementById(
        'previewImage'
    );

// ========================================
// Page Ready
// ========================================

$(document).ready(function () {

    registerEvents();

});

// ========================================
// Register Events
// ========================================

function registerEvents() {

    registerUploadEvents();

    registerMenuEvents();

    registerCropEvents();

    registerSubmitEvent();
}

// ========================================
// Upload Events
// ========================================

function registerUploadEvents() {

    // Desktop Upload Button

    $('#desktopUploadBtn').click(function (e) {

        e.stopPropagation();

        $('#deviceInput').click();

    });

    // Mobile Upload Area

    $('#uploadArea').click(function () {

        if (window.innerWidth <= 768) {

            $('#uploadOptionMenu')
                .removeClass('d-none');
        }
    });

    // Capture Photo

    $('#capturePhotoBtn').click(function () {

        $('#uploadOptionMenu')
            .addClass('d-none');

        $('#cameraInput').click();

    });

    // Upload From Device

    $('#devicePhotoBtn').click(function () {

        $('#uploadOptionMenu')
            .addClass('d-none');

        $('#deviceInput').click();

    });

    // Close Menu On Outside Click

    $(document).click(function (e) {

        if (
            !$(e.target).closest(
                '#uploadOptionMenu, #uploadArea'
            ).length
        ) {

            $('#uploadOptionMenu')
                .addClass('d-none');
        }

    });

    // Camera Input

    $('#cameraInput').change(function () {

        var file =
            this.files[0];

        if (!file)
            return;

        loadImage(file);

    });

    // Device Input

    $('#deviceInput').change(function () {

        var file =
            this.files[0];

        if (!file)
            return;

        loadImage(file);

    });

    registerDragDrop();
}

// ========================================
// Drag Drop
// ========================================

function registerDragDrop() {

    var uploadArea =
        document.getElementById(
            'uploadArea'
        );

    uploadArea.addEventListener(
        'dragover',
        function (e) {

            e.preventDefault();

            $('#uploadArea')
                .addClass(
                    'drag-over'
                );

        });

    uploadArea.addEventListener(
        'dragleave',
        function () {

            $('#uploadArea')
                .removeClass(
                    'drag-over'
                );

        });

    uploadArea.addEventListener(
        'drop',
        function (e) {

            e.preventDefault();

            $('#uploadArea')
                .removeClass(
                    'drag-over'
                );

            var file =
                e.dataTransfer.files[0];

            if (!file)
                return;

            loadImage(file);

        });
}

// ========================================
// Load Image
// ========================================

function loadImage(file) {

    if (
        !file.type.startsWith(
            'image/'
        )
    ) {

        alert(
            'Please upload an image.'
        );

        return;
    }

    currentFileName =
        getFileName(file);

    var reader =
        new FileReader();

    reader.onload =
        function (e) {

            originalImage =
                e.target.result;

            showPreview(
                originalImage
            );

        };

    reader.readAsDataURL(file);
}

// ========================================
// Preview
// ========================================

function showPreview(src) {

    destroyCropper();

    previewImage.src =
        src;

    $('#uploadArea')
        .addClass('d-none');

    $('#previewArea')
        .removeClass('d-none');

    $('#cropActionArea')
        .addClass('d-none');
}

// ========================================
// Menu Events
// ========================================

function registerMenuEvents() {

    $('#rotateBtn').click(function () {

        rotateImage();

    });

    $('#cropBtn').click(function () {

        startCrop();

    });

    $('#undoBtn').click(function () {

        undoChanges();

    });

    $('#removeBtn').click(function () {

        removeImage();

    });
}

// ========================================
// Rotate
// ========================================

function rotateImage() {

    if (!previewImage.src)
        return;

    var img =
        new Image();

    img.onload =
        function () {

            var canvas =
                document.createElement(
                    'canvas'
                );

            var ctx =
                canvas.getContext(
                    '2d'
                );

            canvas.width =
                img.height;

            canvas.height =
                img.width;

            ctx.translate(
                canvas.width / 2,
                canvas.height / 2
            );

            ctx.rotate(
                Math.PI / 2
            );

            ctx.drawImage(
                img,
                -img.width / 2,
                -img.height / 2
            );

            showPreview(
                canvas.toDataURL(
                    'image/jpeg',
                    0.95
                )
            );
        };

    img.src =
        previewImage.src;
}

// ========================================
// Crop
// ========================================

function registerCropEvents() {

    $('#applyCropBtn').click(function () {

        applyCrop();

    });

    $('#cancelCropBtn').click(function () {

        destroyCropper();

        $('#cropActionArea')
            .addClass('d-none');

    });
}

function startCrop() {

    if (
        cropper ||
        !previewImage.src
    )
        return;

    cropper =
        new Cropper(
            previewImage,
            {
                viewMode: 1,
                autoCropArea: 1,
                responsive: true
            });

    $('#cropActionArea')
        .removeClass('d-none');
}

function applyCrop() {

    if (!cropper)
        return;

    var canvas =
        cropper.getCroppedCanvas();

    showPreview(
        canvas.toDataURL(
            'image/jpeg',
            0.95
        )
    );
}

// ========================================
// Undo
// ========================================

function undoChanges() {

    if (!originalImage)
        return;

    showPreview(
        originalImage
    );
}

// ========================================
// Remove
// ========================================

function removeImage() {

    destroyCropper();

    originalImage =
        null;

    currentFileName =
        null;

    previewImage.src =
        '';

    $('#cameraInput').val('');

    $('#deviceInput').val('');

    $('#previewArea')
        .addClass('d-none');

    $('#uploadArea')
        .removeClass('d-none');
}

// ========================================
// Destroy Cropper
// ========================================

function destroyCropper() {

    if (!cropper)
        return;

    cropper.destroy();

    cropper = null;
}

// ========================================
// File Name
// ========================================

function getFileName(file) {

    var name =
        file.name.toLowerCase();

    if (
        name !== 'image.jpg' &&
        name !== 'image.jpeg'
    ) {

        return file.name;
    }

    var now =
        new Date();

    function pad(value) {

        return String(value)
            .padStart(2, '0');
    }

    return 'damage_' +
        now.getFullYear() +
        pad(now.getMonth() + 1) +
        pad(now.getDate()) +
        '_' +
        pad(now.getHours()) +
        pad(now.getMinutes()) +
        pad(now.getSeconds()) +
        '.jpg';
}

// ========================================
// Submit
// ========================================

function registerSubmitEvent() {

    $('#submitReturnBtn')
        .click(function () {

            submitReturn();

        });
}

async function submitReturn() {

    var description =
        $('#damageDescription')
            .val()
            .trim();

    if (!previewImage.src) {

        alert(
            'Please upload an image.'
        );

        return;
    }

    if (!description) {

        alert(
            'Please enter a description.'
        );

        return;
    }

    var blob =
        await imageToBlob(
            previewImage.src
        );

    var formData =
        new FormData();

    formData.append(
        'damageImage',
        blob,
        currentFileName
    );

    formData.append(
        'description',
        description
    );

    console.log(
        'Ready To Upload'
    );

    console.log(
        currentFileName
    );

    // AJAX call here
}

// ========================================
// Convert Image To Blob
// ========================================

function imageToBlob(src) {

    return new Promise(
        function (resolve) {

            var img =
                new Image();

            img.onload =
                function () {

                    var canvas =
                        document.createElement(
                            'canvas'
                        );

                    canvas.width =
                        img.naturalWidth;

                    canvas.height =
                        img.naturalHeight;

                    canvas
                        .getContext('2d')
                        .drawImage(
                            img,
                            0,
                            0
                        );

                    canvas.toBlob(
                        resolve,
                        'image/jpeg',
                        0.95
                    );
                };

            img.src = src;
        });
}
  </script>
  </body>
</html>
