<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
   <!-- Bootstrap -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<!-- Cropper -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

      <style>
        /* ==================================================
   MODAL
================================================== */

.image-modal{

    background:#1f2937;
    color:#fff;

    border:1px solid #334155;
    border-radius:16px;

    overflow:hidden;
}

.image-modal .modal-header{

    border-bottom:1px solid #334155;

    background:#1f2937;
}

.image-modal .modal-footer{

    border-top:1px solid #334155;

    background:#1f2937;
}

.image-modal .modal-title{

    font-weight:600;
}

.image-modal .close{

    opacity:.8;
}

.image-modal .close:hover{

    opacity:1;
}

/* ==================================================
   IMAGE CONTAINER
================================================== */

.image-container{

    position:relative;

    width:100%;
    height:340px;

    border-radius:14px;

    overflow:hidden;

    background:#0f172a;

    border:1px solid #334155;
}

/* ==================================================
   UPLOAD AREA
================================================== */

#uploadArea{

    width:100%;
    height:100%;

    display:flex;

    justify-content:center;
    align-items:center;

    cursor:pointer;

    border:2px dashed #475569;

    transition:.3s;
}

#uploadArea.drag-over{

    border-color:#3b82f6;

    background:rgba(37,99,235,.08);
}

.upload-content{

    text-align:center;
}

.upload-icon{

    font-size:50px;

    color:#60a5fa;

    margin-bottom:15px;
}

.upload-content h5{

    font-weight:600;

    margin-bottom:10px;
}

.upload-content p{

    color:#94a3b8;

    margin-bottom:0;
}

/* ==================================================
   PREVIEW AREA
================================================== */

#previewArea{

    width:100%;
    height:100%;
}

#previewImage{

    width:100%;
    height:100%;

    object-fit:contain;

    display:block;
}

/* ==================================================
   THREE DOT MENU
================================================== */

.image-dropdown{

    position:absolute;

    top:10px;
    right:10px;

    z-index:9999;
}

#imageMenuBtn{

    width:38px;
    height:38px;

    border-radius:50%;

    background:rgba(15,23,42,.85);

    display:flex;

    justify-content:center;
    align-items:center;

    text-decoration:none;

    border:none;
}

#imageMenuBtn:hover{

    background:#2563eb;
}

#imageMenuBtn i{

    color:#fff;
}

/* ==================================================
   DROPDOWN
================================================== */

.dropdown-menu{

    background:#111827;

    border:1px solid #334155;

    min-width:180px;
}

.dropdown-item{

    color:#e5e7eb;

    transition:.2s;
}

.dropdown-item:hover{

    background:#2563eb;

    color:white;
}

.dropdown-divider{

    border-top:1px solid #334155;
}

/* ==================================================
   CROP ACTION AREA
================================================== */

#cropActionArea{

    padding-top:5px;
}

#cropActionArea .btn{

    min-width:130px;
}

/* ==================================================
   TEXTAREA
================================================== */

.damage-textarea{

    background:#0f172a !important;

    color:white !important;

    border:1px solid #475569;

    border-radius:10px;

    resize:none;
}

.damage-textarea:focus{

    background:#0f172a !important;

    color:white !important;

    border-color:#3b82f6;

    box-shadow:none;
}

.damage-textarea::placeholder{

    color:#94a3b8;
}

/* ==================================================
   BUTTONS
================================================== */

.btn-primary{

    background:#2563eb;

    border-color:#2563eb;
}

.btn-primary:hover{

    background:#1d4ed8;

    border-color:#1d4ed8;
}

.btn-secondary{

    background:#64748b;

    border-color:#64748b;
}

/* ==================================================
   CROPPER
================================================== */

.cropper-view-box{

    outline:2px solid #3b82f6;
}

.cropper-line{

    background:#3b82f6;
}

.cropper-point{

    background:#3b82f6;
}

/* ==================================================
   MOBILE
================================================== */

@media(max-width:768px){

     .modal-dialog {
        margin: 10px;
        max-width: calc(100% - 20px);
    }

    .image-container {
        height: 280px;
    }

    .image-modal{

        min-height:100vh;

        border-radius:0;
    }

   

    .upload-icon{

        font-size:40px;
    }

    .upload-content h5{

        font-size:16px;
    }

    .upload-content p{

        font-size:13px;
    }

    .dropdown-menu{

        min-width:150px;
    }

    #cropActionArea .btn{

        width:100%;

        margin-bottom:10px;
    }

    #cropActionArea .btn:last-child{

        margin-bottom:0;
    }
}

/* ==================================================
   SMALL PHONES
================================================== */

@media(max-width:480px){

    .image-container{

        height:220px;
    }

    .upload-icon{

        font-size:34px;
    }

    .upload-content h5{

        font-size:15px;
    }

    .upload-content p{

        font-size:12px;
    }
}

/* ==================================================
   LARGE DESKTOP
================================================== */

@media(min-width:1200px){

    .image-container{

        height:400px;
    }
}
      </style>
  </head>
  <body>

  <!-- OPEN MODAL TRIGGER RUNTIME BUTTON -->

    <div class="container text-center mt-5">

        <button class="btn btn-primary px-4 py-2" data-toggle="modal" data-target="#uploadImageComentModal">

            upload

        </button>

    </div>

     <!-- Modal -->
<div class="modal fade"
     id="uploadImageComentModal"
     tabindex="-1"
     role="dialog">

    <div class="modal-dialog modal-lg modal-dialog-centered"
         role="document">

        <div class="modal-content image-modal">

            <!-- Header -->
            <div class="modal-header">

                <h5 class="modal-title">
                   upload image
                </h5>

                <button type="button"
                        class="close text-white"
                        data-dismiss="modal">

                    <span>&times;</span>

                </button>

            </div>

            <!-- Body -->
            <div class="modal-body">

                <!-- Hidden File Input -->
                <input type="file"
                       id="imageInput"
                       accept="image/*"
                       capture="environment"
                       hidden>

                <!-- Upload / Preview Area -->
                <div class="image-container">

                    <!-- 3 Dot Menu -->
                    <div class="dropdown image-dropdown">

                        <button class="btn btn-link text-white p-0"
                                id="imageMenuBtn"
                                data-toggle="dropdown">

                            <i class="fas fa-ellipsis-v"></i>

                        </button>

                        <div class="dropdown-menu dropdown-menu-right">

                            <button class="dropdown-item"
                                    id="rotateBtn"
                                    type="button">

                                <i class="fas fa-sync-alt mr-2"></i>
                                Rotate

                            </button>

                            <button class="dropdown-item"
                                    id="cropBtn"
                                    type="button">

                                <i class="fas fa-crop-alt mr-2"></i>
                                Crop

                            </button>

                            <button class="dropdown-item"
                                    id="undoBtn"
                                    type="button">

                                <i class="fas fa-undo mr-2"></i>
                                Undo

                            </button>

                            <div class="dropdown-divider"></div>

                            <button class="dropdown-item text-danger"
                                    id="removeBtn"
                                    type="button">

                                <i class="fas fa-trash mr-2"></i>
                                Remove

                            </button>

                        </div>

                    </div>

                    <!-- Upload Area -->
                    <div id="uploadArea">

                        <div class="upload-content">

                            <i class="fas fa-camera upload-icon"></i>

                            <h5>
                                Upload Gear Image
                            </h5>

                            <p>
                                Drag & Drop or Tap to Upload
                            </p>

                        </div>

                    </div>

                    <!-- Preview Area -->
                    <div id="previewArea"
                         class="d-none">

                        <img id="previewImage"
                             alt="Preview">

                    </div>

                </div>

                <!-- Crop Buttons -->
                <div id="cropActionArea"
                     class="mt-3 text-center d-none">

                    <button type="button"
                            id="applyCropBtn"
                            class="btn btn-success">

                        Apply Crop

                    </button>

                    <button type="button"
                            id="cancelCropBtn"
                            class="btn btn-secondary ml-2">

                        Cancel Crop

                    </button>

                </div>

                <!-- Description -->
                <div class="mt-4">

                    <textarea
                        id="damageDescription"
                        class="form-control damage-textarea"
                        rows="5"
                        placeholder="Describe the damage..."></textarea>

                </div>

            </div>

            <!-- Footer -->
            <div class="modal-footer">

                <button type="button"
                        class="btn btn-secondary"
                        data-dismiss="modal">

                    Cancel

                </button>

                <button type="button"
                        class="btn btn-primary"
                        id="submitimageBtn">

                    Submit

                </button>

            </div>

        </div>

    </div>

</div>

     <!-- Required Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
    (() => {

    const state = {
        cropper: null,
        originalImage: null,
        currentFileName: null,
        rotation: 0
    };

    const el = {

        imageInput:
            document.getElementById('imageInput'),

        uploadArea:
            document.getElementById('uploadArea'),

        previewArea:
            document.getElementById('previewArea'),

        previewImage:
            document.getElementById('previewImage'),

        cropActionArea:
            document.getElementById('cropActionArea'),

        applyCropBtn:
            document.getElementById('applyCropBtn'),

        cancelCropBtn:
            document.getElementById('cancelCropBtn'),

        rotateBtn:
            document.getElementById('rotateBtn'),

        cropBtn:
            document.getElementById('cropBtn'),

        undoBtn:
            document.getElementById('undoBtn'),

        removeBtn:
            document.getElementById('removeBtn'),

        submitBtn:
            document.getElementById('submitimageBtn'),

        description:
            document.getElementById('damageDescription')
    };

    /* -----------------------------
       Upload
    ----------------------------- */

    el.uploadArea.addEventListener(
        'click',
        () => el.imageInput.click()
    );

    el.imageInput.addEventListener(
        'change',
        e => {

            const file =
                e.target.files?.[0];

            if(!file)
                image;

            loadImage(file);
        }
    );

    /* -----------------------------
       Drag Drop
    ----------------------------- */

    [
        'dragenter',
        'dragover'
    ].forEach(evt => {

        el.uploadArea.addEventListener(
            evt,
            e => {

                e.preventDefault();

                el.uploadArea.classList.add(
                    'drag-over'
                );

            }
        );

    });

    [
        'dragleave',
        'drop'
    ].forEach(evt => {

        el.uploadArea.addEventListener(
            evt,
            e => {

                e.preventDefault();

                el.uploadArea.classList.remove(
                    'drag-over'
                );

            }
        );

    });

    el.uploadArea.addEventListener(
        'drop',
        e => {

            const file =
                e.dataTransfer.files?.[0];

            if(!file)
                return;

            loadImage(file);

        }
    );

    /* -----------------------------
       Load Image
    ----------------------------- */

    function loadImage(file){

        if(
            !file.type.startsWith(
                'image/'
            )
        ){
            alert(
                'Please upload an image.'
            );

            return;
        }

        state.rotation = 0;

        state.currentFileName =
            getFileName(file);

        const reader =
            new FileReader();

        reader.onload =
            e => {

                state.originalImage =
                    e.target.result;

                showPreview(
                    e.target.result
                );

            };

        reader.readAsDataURL(file);
    }

    /* -----------------------------
       Preview
    ----------------------------- */

    function showPreview(src){

        destroyCropper();

        el.previewImage.src = src;

        el.uploadArea.classList.add(
            'd-none'
        );

        el.previewArea.classList.remove(
            'd-none'
        );

        el.cropActionArea.classList.add(
            'd-none'
        );
    }

    /* -----------------------------
       Rotate
    ----------------------------- */

    el.rotateBtn.addEventListener(
        'click',
        rotateImage
    );

    function rotateImage(){

        if(
            !el.previewImage.src
        )
            return;

        state.rotation += 90;

        const img =
            new Image();

        img.onload =
            () => {

                const canvas =
                    document.createElement(
                        'canvas'
                    );

                const ctx =
                    canvas.getContext(
                        '2d'
                    );

                canvas.width =
                    img.height;

                canvas.height =
                    img.width;

                ctx.translate(
                    canvas.width / 2,
                    canvas.height / 2
                );

                ctx.rotate(
                    Math.PI / 2
                );

                ctx.drawImage(
                    img,
                    -img.width/2,
                    -img.height/2
                );

                showPreview(
                    canvas.toDataURL(
                        'image/jpeg',
                        0.95
                    )
                );

            };

        img.src =
            el.previewImage.src;
    }

    /* -----------------------------
       Crop
    ----------------------------- */

    el.cropBtn.addEventListener(
        'click',
        startCrop
    );

    function startCrop(){

        if(
            !el.previewImage.src
        )
            return;

        if(state.cropper)
            return;

        state.cropper =
            new Cropper(
                el.previewImage,
                {
                    viewMode:1,
                    autoCropArea:1,
                    responsive:true
                }
            );

        el.cropActionArea.classList.remove(
            'd-none'
        );
    }

    el.applyCropBtn.addEventListener(
        'click',
        applyCrop
    );

    function applyCrop(){

        if(
            !state.cropper
        )
            return;

        const canvas =
            state.cropper
            .getCroppedCanvas({
                imageSmoothingEnabled:true,
                imageSmoothingQuality:'high'
            });

        showPreview(
            canvas.toDataURL(
                'image/jpeg',
                0.95
            )
        );
    }

    el.cancelCropBtn.addEventListener(
        'click',
        () => {

            destroyCropper();

            el.cropActionArea.classList.add(
                'd-none'
            );

        }
    );

    /* -----------------------------
       Undo
       image To Original Upload
    ----------------------------- */

    el.undoBtn.addEventListener(
        'click',
        () => {

            if(
                !state.originalImage
            )
                return;

            showPreview(
                state.originalImage
            );

        }
    );

    /* -----------------------------
       Remove
    ----------------------------- */

    el.removeBtn.addEventListener(
        'click',
        () => {

            destroyCropper();

            state.originalImage =
                null;

            state.rotation = 0;

            state.currentFileName =
                null;

            el.previewImage.src =
                '';

            el.imageInput.value =
                '';

            el.previewArea.classList.add(
                'd-none'
            );

            el.uploadArea.classList.remove(
                'd-none'
            );
        }
    );

    /* -----------------------------
       Cropper Cleanup
    ----------------------------- */

    function destroyCropper(){

        if(!state.cropper)
            return;

        state.cropper.destroy();

        state.cropper = null;
    }

    /* -----------------------------
       File Naming
    ----------------------------- */

    function getFileName(file){

        const name =
            file.name.toLowerCase();

        const cameraNames = [
            'image.jpg',
            'image.jpeg',
            'photo.jpg'
        ];

        if(
            !cameraNames.includes(name)
        ){
            return file.name;
        }

        const now =
            new Date();

        const pad =
            v => String(v)
            .padStart(2,'0');

        return `damage_${
            now.getFullYear()
        }${
            pad(now.getMonth()+1)
        }${
            pad(now.getDate())
        }_${
            pad(now.getHours())
        }${
            pad(now.getMinutes())
        }${
            pad(now.getSeconds())
        }.jpg`;
    }

    /* -----------------------------
       Submit
    ----------------------------- */

    el.submitBtn.addEventListener(
        'click',
        submitimage
    );

    async function submitimage(){

        const description =
            el.description.value.trim();

        if(
            !el.previewImage.src
        ){
            alert(
                'Please upload an image.'
            );

            return;
        }

        if(!description){

            alert(
                'Please enter a description.'
            );

            return;
        }

        const blob =
            await imageToBlob(
                el.previewImage.src
            );

        const formData =
            new FormData();

        formData.append(
            'damageImage',
            blob,
            state.currentFileName
        );

        formData.append(
            'description',
            description
        );

        /*
        await fetch(
            '/Gear/imageGear',
            {
                method:'POST',
                body:formData
            }
        );
        */

        console.log(
            'Ready For Upload'
        );

        console.log(
            state.currentFileName
        );
    }

    function imageToBlob(src){

        return new Promise(
            resolve => {

                const img =
                    new Image();

                img.onload =
                    () => {

                        const canvas =
                            document.createElement(
                                'canvas'
                            );

                        canvas.width =
                            img.naturalWidth;

                        canvas.height =
                            img.naturalHeight;

                        canvas
                        .getContext('2d')
                        .drawImage(
                            img,
                            0,
                            0
                        );

                        canvas.toBlob(
                            resolve,
                            'image/jpeg',
                            0.95
                        );
                    };

                img.src = src;
            }
        );
    }

})();
</script>
  </body>
</html>
